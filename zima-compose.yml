name: asset-tracker

services:
  app:
    image: ghcr.io/ly-man-do/asset-tracker:latest
    container_name: asset-tracker
    restart: unless-stopped
    network_mode: bridge
    ports:
      - target: 3000
        published: "3000"
        protocol: tcp
    environment:
      - DATABASE_URL=file:/data/assets.db
      - UPLOAD_DIR=/uploads
    volumes:
      - type: bind
        source: /DATA/AppData/asset-tracker/data
        target: /data
      - type: bind
        source: /DATA/AppData/asset-tracker/uploads
        target: /uploads
    labels:
      icon: https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/paperless-ngx.png
    x-casaos:
      envs:
        - container: DATABASE_URL
          description:
            en_us: Path to the SQLite database file.
        - container: UPLOAD_DIR
          description:
            en_us: Directory where file attachments are stored.
      ports:
        - container: "3000"
          description:
            en_us: Asset Tracker Web UI
      volumes:
        - container: /data
          description:
            en_us: SQLite database storage.
        - container: /uploads
          description:
            en_us: File attachment storage.

x-casaos:
  architectures:
    - amd64
    - arm64
  main: app
  author: ly-man-do
  category: Finance
  description:
    en_us: |
      Asset Tracker is a self-hosted personal asset management app.

      Track everything you own — purchase date, price, store, warranty, and attached files like receipts or manuals. Mark assets as Active, Sold, or Lost and see your realized profit & loss automatically.

      Features include a sortable table view, bulk actions, CSV export, sub-items for accessories, and a Cmd+K search. Comes with light/dark mode and 12 accent color themes.
  developer: ly-man-do
  icon: https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/paperless-ngx.png
  tagline:
    en_us: Track your assets, warranties, and profit & loss — self-hosted
  title:
    en_us: Asset Tracker
  tips:
    before_install:
      en_us: |
        Default Configuration:
        - Web UI Port: 3000
        - Database: /DATA/AppData/asset-tracker/data/assets.db
        - Uploads: /DATA/AppData/asset-tracker/uploads

        Both directories are created automatically on first run.
        Your data persists across container updates.
  index: /
  port_map: "3000"
  scheme: http
  store_app_id: asset-tracker
  hostname: ""
  author_url: https://github.com/ly-man-do
  project_url: https://github.com/ly-man-do/asset-tracker
